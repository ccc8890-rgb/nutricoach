<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Limpiando caché NutriCoach</title>
    <style>
        body {
            font-family: -apple-system, system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #f5f5f7;
            color: #1c1c1e;
        }

        .card {
            text-align: center;
            padding: 2rem;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #e5e5ea;
            border-top-color: #22c55e;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        p {
            margin: 0.5rem 0;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="spinner"></div>
        <h2>Limpiando caché...</h2>
        <p>Eliminando Service Worker y datos antiguos</p>
    </div>
    <script>
        (async function () {
            // 1. Unregister all service workers
            if ('serviceWorker' in navigator) {
                const registrations = await navigator.serviceWorker.getRegistrations()
                for (const reg of registrations) {
                    await reg.unregister()
                    console.log('SW unregistered:', reg.scope)
                }
            }

            // 2. Clear caches
            if ('caches' in window) {
                const keys = await caches.keys()
                for (const key of keys) {
                    await caches.delete(key)
                    console.log('Cache deleted:', key)
                }
            }

            // 3. Clear localStorage
            localStorage.clear()

            // 4. Clear sessionStorage
            sessionStorage.clear()

            console.log('Cleanup complete. Redirecting to /')

            // 5. Redirect with cache-bust
            window.location.href = '/?_=' + Date.now()
        })()
    </script>
</body>

</html>
